<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bizme Widget Test</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f8fafc;
        color: #111827;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(960px, calc(100% - 32px));
        margin: 48px auto;
      }

      .card {
        margin-bottom: 24px;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        background: #ffffff;
        padding: 24px;
        box-shadow: 0 1px 2px rgb(15 23 42 / 0.04);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #6b7280;
        line-height: 1.6;
      }

      form {
        display: grid;
        gap: 14px;
        margin-top: 20px;
      }

      label {
        display: grid;
        gap: 6px;
        color: #374151;
        font-size: 13px;
        font-weight: 600;
      }

      input {
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 10px 12px;
        color: #111827;
        font: inherit;
      }

      button {
        width: fit-content;
        border: 0;
        border-radius: 10px;
        background: #6170f8;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 10px 14px;
      }

      code {
        border-radius: 6px;
        background: #f3f4f6;
        color: #4f46e5;
        padding: 2px 5px;
      }

      #comments {
        min-height: 240px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Bizme Widget Test</h1>
        <p>
          Use this page to smoke test <code>/sdk.js</code>. Paste a real
          organization id as the install key, then initialize the widget.
        </p>

        <form id="widget-form">
          <label>
            Install key
            <input
              id="install-key"
              name="installKey"
              placeholder="organization id"
              value="demo-install-key"
              required
            />
          </label>

          <label>
            API URL
            <input id="api-url" name="apiUrl" value="http://localhost:3000" required />
          </label>

          <button type="submit">Initialize widget</button>
        </form>
      </section>

      <section id="comments"></section>
    </main>

    <script>
      (function (w, d) {
        if (typeof w.Bizme !== "function") {
          var q = [];
          var stub = function () {
            q.push(arguments);
          };
          stub.q = q;
          w.Bizme = stub;
        }

        var script = d.createElement("script");
        script.src = "/sdk.js?v=demo-comments";
        script.async = true;
        d.head.appendChild(script);
      })(window, document);

      var form = document.getElementById("widget-form");
      var installKey = document.getElementById("install-key");
      var apiUrl = document.getElementById("api-url");

      function initWidget() {
        window.Bizme("destroy");
        window.Bizme("init", {
          installKey: installKey.value,
          apiUrl: apiUrl.value,
          selector: "#comments",
          pageUrl: window.location.href,
          pageTitle: document.title,
        });
      }

      form.addEventListener("submit", function (event) {
        event.preventDefault();

        initWidget();
      });

      initWidget();
    </script>
  </body>
</html>
